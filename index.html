<script type="module">
    // Wait for firebase globals (db, ref, onValue etc)
    const db = window.db;
    const dbRef = window.dbRef;
    const dbOnValue = window.dbOnValue;

    // DOM elements
    const taskGrid = document.getElementById('taskGrid');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchButton');
    const overlay = document.getElementById('detailOverlay');
    const detailTitle = document.getElementById('detailTitle');
    const detailDesc = document.getElementById('detailDescription');
    const downloadBtn = document.getElementById('downloadRedirectBtn');
    const closeBtn = document.getElementById('closeDetailBtn');

    let allTasks = [];
    let currentFilter = '';

    // Firebase reference (collection name: studio_items — avoids 'admin')
    const itemsRef = dbRef(db, 'studio_items');

    // Render grid with filter
    function renderGrid(filterText = '') {
        const filtered = allTasks.filter(item => 
            item.title.toLowerCase().includes(filterText.toLowerCase())
        );
        
        if (filtered.length === 0) {
            taskGrid.innerHTML = `<div class="no-tasks"><i class="far fa-compass"></i> No items found. Add via Studio panel.</div>`;
            return;
        }

        let html = '';
        filtered.forEach(item => {
            const icon = item.thumbnailIcon || 'fa-cube';
            html += `
                <div class="task-card" data-id="${item.id}" data-title="${escapeAttr(item.title)}" data-desc="${escapeAttr(item.description)}" data-link="${escapeAttr(item.link)}">
                    <div class="thumbnail">
                        <i class="fas ${icon}"></i>
                    </div>
                    <div class="card-info">
                        <div class="card-title">${escapeHtml(item.title) || 'Untitled'}</div>
                        <div class="card-meta"><i class="far fa-arrow-right-circle"></i> tap to explore</div>
                    </div>
                </div>
            `;
        });
        taskGrid.innerHTML = html;

        // Attach click listeners to cards
        document.querySelectorAll('.task-card').forEach(card => {
            card.addEventListener('click', () => {
                const title = card.dataset.title;
                const desc = card.dataset.desc;
                const link = card.dataset.link;
                
                detailTitle.textContent = title || 'Resource';
                detailDesc.textContent = desc || 'No description provided.';
                downloadBtn.dataset.redirectUrl = link || '#';
                overlay.style.display = 'flex';
            });
        });
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    function escapeAttr(text) {
        return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    // Load items from Firebase
    dbOnValue(itemsRef, (snapshot) => {
        const data = snapshot.val();
        const itemsArray = [];
        if (data) {
            Object.entries(data).forEach(([key, value]) => {
                itemsArray.push({
                    id: key,
                    title: value.title || 'Resource',
                    description: value.description || '',
                    link: value.link || '#',
                    thumbnailIcon: value.thumbnailIcon || 'fa-cube'
                });
            });
        }
        allTasks = itemsArray;
        renderGrid(currentFilter);
    }, { onlyOnce: false });

    // Search
    function applySearch() {
        currentFilter = searchInput.value.trim();
        renderGrid(currentFilter);
    }
    searchBtn.addEventListener('click', applySearch);
    searchInput.addEventListener('keyup', (e) => {
        if (e.key === 'Enter') applySearch();
    });

    // Overlay close
    closeBtn.addEventListener('click', () => overlay.style.display = 'none');
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.style.display = 'none'; });

    // Redirect button
    downloadBtn.addEventListener('click', () => {
        const url = downloadBtn.dataset.redirectUrl;
        if (url && url !== '#' && url.trim() !== '') {
            window.open(url, '_blank');
        } else {
            alert('No valid link provided for this item.');
        }
    });
</script>
